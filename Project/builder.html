<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder – ThiranMitra | Create Beautiful Resumes</title>
    <meta name="description"
        content="Build a professional, ATS-friendly resume in minutes with our drag-and-drop resume builder." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <style>
        /* BUILDER SPECIFIC STYLES */
        body {
            background-color: var(--bg-surface);
        }

        .builder-layout {
            display: grid;
            grid-template-columns: 450px 1fr;
            height: calc(100vh - 80px);
            /* 80px for standard navbar */
            margin-top: 80px;
            overflow: hidden;
        }

        /* LEFT PANEL: Form Editor */
        .editor-panel {
            background: var(--bg-card);
            border-right: 1px solid var(--bg-glass-border);
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .editor-panel::-webkit-scrollbar {
            width: 8px;
        }

        .editor-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .editor-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .form-section {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            transition: border-color 0.3s ease;
        }

        .form-section:hover {
            border-color: rgba(79, 70, 229, 0.3);
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dynamic-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: #ef4444;
            color: white;
        }

        .add-btn {
            width: 100%;
            background: transparent;
            border: 1px dashed rgba(79, 70, 229, 0.5);
            color: var(--primary-light);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .add-btn:hover {
            background: rgba(79, 70, 229, 0.1);
            border-color: var(--primary);
        }

        /* RIGHT PANEL: Live Preview */
        .preview-panel {
            background: #111827;
            padding: 2.5rem;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .resume-paper {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 2.5in 2.5in;
            /* We'll override via js to look good on screen */
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            color: #111;
            /* Always dark text since it's a paper */
            font-family: 'Inter', sans-serif;
            border-radius: 4px;
        }

        /* A4 PROPORTIONS FOR PRINT */
        .resume-paper {
            width: 800px;
            min-height: 1131px;
        }

        .r-header {
            border-bottom: 2px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .r-name {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #111;
        }

        .r-title {
            font-size: 16px;
            color: #4f46e5;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .r-contact {
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .r-section {
            margin-bottom: 20px;
        }

        .r-section-title {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: #111;
            letter-spacing: 0.5px;
        }

        .r-summary {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .r-item {
            margin-bottom: 15px;
        }

        .r-item-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 3px;
        }

        .r-item-title {
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }

        .r-item-date {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }

        .r-item-subtitle {
            font-size: 14px;
            color: #4f46e5;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .r-item-desc {
            font-size: 13.5px;
            line-height: 1.5;
            color: #444;
            white-space: pre-line;
        }

        .r-skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .r-skill-badge {
            background: #f3f4f6;
            color: #111;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #e5e7eb;
        }

        /* ACTIONS BAR */
        .actions-bar {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn-print {
            background: var(--accent);
            color: #111;
            font-weight: bold;
            font-size: 1rem;
            padding: 1rem 2rem;
            border-radius: 30px;
            border: none;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-print:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.5);
        }

        /* PRINT STYLES */
        @media print {
            body {
                background: white;
            }

            .navbar,
            .editor-panel,
            .actions-bar,
            .chatbot-widget {
                display: none !important;
            }

            .builder-layout {
                display: block;
                margin: 0;
                padding: 0;
                height: auto;
            }

            .preview-panel {
                padding: 0;
                background: white;
                overflow: visible;
                display: block;
            }

            .resume-paper {
                box-shadow: none;
                padding: 0;
                width: 100%;
                min-height: auto;
            }
        }

        @media (max-width: 1000px) {
            .builder-layout {
                grid-template-columns: 1fr;
                height: auto;
                overflow: visible;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--bg-glass-border);
            }

            .actions-bar {
                position: fixed;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- NAV -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a class="nav-logo" href="index.html">
                <span class="logo-icon">🌉</span>
                <span class="logo-text">Thiran<span class="logo-accent">Mitra</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="jobs.html" class="nav-link">Jobs</a></li>
                <li><a href="resume.html" class="nav-link active">Resume</a></li>
                <li><a href="skills.html" class="nav-link">Skills</a></li>
                <li><a href="interview.html" class="nav-link">Interview</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="builder-layout">
        <!-- LEFT PANEL: EDITOR -->
        <div class="editor-panel">
            <h1 style="font-size:1.5rem; font-weight:800; margin-bottom:0.5rem; color:var(--text-primary);">📝 Resume
                Builder</h1>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem;">Fill in your details below. The
                preview updates instantly in real-time.</p>

            <!-- 1. PERSONAL INFO -->
            <div class="form-section">
                <div class="section-title"><span>👤</span> Personal Info</div>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="inpName" value="Rahul Sharma" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label class="form-label">Professional Title</label>
                    <input type="text" class="form-input" id="inpTitle" value="Senior Software Engineer"
                        oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="inpEmail" value="rahul.sharma@example.com"
                        oninput="updateResume()">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-input" id="inpPhone" value="+91 98765 43210"
                            oninput="updateResume()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-input" id="inpLocation" value="Bangalore, India"
                            oninput="updateResume()">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">LinkedIn / Portfolio URL</label>
                    <input type="text" class="form-input" id="inpLink" value="linkedin.com/in/rahulsharma"
                        oninput="updateResume()">
                </div>
            </div>

            <!-- 2. SUMMARY -->
            <div class="form-section">
                <div class="section-title"><span>🎯</span> Professional Summary</div>
                <textarea class="form-input form-textarea" id="inpSummary" rows="4"
                    oninput="updateResume()">Results-oriented software engineer with 4+ years of experience in building scalable web applications. Proficient in MERN stack and cloud deployments. Passionate about writing clean, maintainable code and optimizing system performance.</textarea>
            </div>

            <!-- 3. EXPERIENCE -->
            <div class="form-section">
                <div class="section-title"><span>💼</span> Work Experience</div>
                <div id="expContainer"></div>
                <button class="add-btn" onclick="addExperience()">+ Add Experience</button>
            </div>

            <!-- 4. EDUCATION -->
            <div class="form-section">
                <div class="section-title"><span>🎓</span> Education</div>
                <div id="eduContainer"></div>
                <button class="add-btn" onclick="addEducation()">+ Add Education</button>
            </div>

            <!-- 5. SKILLS -->
            <div class="form-section">
                <div class="section-title"><span>🛠️</span> Technical Skills</div>
                <div class="form-group">
                    <label class="form-label">Comma separated list</label>
                    <textarea class="form-input form-textarea" id="inpSkills" rows="3"
                        oninput="updateResume()">JavaScript, React, Node.js, Express, MongoDB, Postgres, Docker, AWS, Git</textarea>
                </div>
            </div>

        </div>

        <!-- RIGHT PANEL: LIVE PREVIEW -->
        <div class="preview-panel">
            <div class="resume-paper" id="resumePreview">
                <!-- Data will be injected here via JS -->
            </div>

            <div class="actions-bar">
                <button class="btn-print" onclick="window.print()">📥 Download PDF</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Data Arrays
        let experiences = [
            { id: 1, title: 'Software Development Engineer II', company: 'TechCorp India', date: 'Jan 2021 - Present', desc: '• Led a team of 4 to migrate legacy monolithic architecture to microservices.\n• Improved API response time by 40% through Redis caching and query optimization.\n• Built and maintained CI/CD pipelines using GitHub Actions and AWS CodeDeploy.' },
            { id: 2, title: 'Frontend Developer', company: 'Startup Solutions', date: 'July 2019 - Dec 2020', desc: '• Developed responsive, pixel-perfect UI components using React and styled-components.\n• Increased user retention by 25% by redesigning the onboarding flow.\n• Integrated multiple RESTful APIs and ensured robust error handling state.' }
        ];

        let educations = [
            { id: 1, degree: 'B.Tech in Computer Science', school: 'National Institute of Technology (NIT)', date: '2015 - 2019', desc: 'CGPA: 8.5/10 | Relevant Coursework: Data Structures, Algorithms, OS, DBMS' }
        ];

        // RENDER EDITOR FORMS
        function renderExpForms() {
            const container = document.getElementById('expContainer');
            container.innerHTML = experiences.map((exp, index) => `
                <div class="dynamic-item">
                    <button class="remove-btn" onclick="removeExp(${exp.id})">✕</button>
                    <div class="form-group">
                        <label class="form-label">Job Title</label>
                        <input type="text" class="form-input" value="${escapeHtml(exp.title)}" oninput="updateExp(${index}, 'title', this.value)">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label class="form-label">Company</label>
                            <input type="text" class="form-input" value="${escapeHtml(exp.company)}" oninput="updateExp(${index}, 'company', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Dates (e.g. 2020 - 2023)</label>
                            <input type="text" class="form-input" value="${escapeHtml(exp.date)}" oninput="updateExp(${index}, 'date', this.value)">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">Description (Bullet points)</label>
                        <textarea class="form-input form-textarea" rows="4" oninput="updateExp(${index}, 'desc', this.value)">${escapeHtml(exp.desc)}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function renderEduForms() {
            const container = document.getElementById('eduContainer');
            container.innerHTML = educations.map((edu, index) => `
                <div class="dynamic-item">
                    <button class="remove-btn" onclick="removeEdu(${edu.id})">✕</button>
                    <div class="form-group">
                        <label class="form-label">Degree / Certificate</label>
                        <input type="text" class="form-input" value="${escapeHtml(edu.degree)}" oninput="updateEdu(${index}, 'degree', this.value)">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <div class="form-group">
                            <label class="form-label">School / University</label>
                            <input type="text" class="form-input" value="${escapeHtml(edu.school)}" oninput="updateEdu(${index}, 'school', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Year / Dates</label>
                            <input type="text" class="form-input" value="${escapeHtml(edu.date)}" oninput="updateEdu(${index}, 'date', this.value)">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">Additional Info (Grade, projects)</label>
                        <input type="text" class="form-input" value="${escapeHtml(edu.desc)}" oninput="updateEdu(${index}, 'desc', this.value)">
                    </div>
                </div>
            `).join('');
        }

        // CRUD Actions for Arrays
        function addExperience() {
            experiences.push({ id: Date.now(), title: '', company: '', date: '', desc: '' });
            renderExpForms();
            updateResume();
        }
        function removeExp(id) {
            experiences = experiences.filter(e => e.id !== id);
            renderExpForms();
            updateResume();
        }
        function updateExp(index, field, value) {
            experiences[index][field] = value;
            updateResume();
        }

        function addEducation() {
            educations.push({ id: Date.now(), degree: '', school: '', date: '', desc: '' });
            renderEduForms();
            updateResume();
        }
        function removeEdu(id) {
            educations = educations.filter(e => e.id !== id);
            renderEduForms();
            updateResume();
        }
        function updateEdu(index, field, value) {
            educations[index][field] = value;
            updateResume();
        }

        // HTML Escaper for Prevents XSS visually
        function escapeHtml(unsafe) {
            return (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function escapeToBr(str) {
            return escapeHtml(str).replace(/\n/g, '<br>');
        }

        // UPDATE RESUME PREVIEW (A4 Render)
        function updateResume() {
            const name = document.getElementById('inpName').value;
            const title = document.getElementById('inpTitle').value;
            const email = document.getElementById('inpEmail').value;
            const phone = document.getElementById('inpPhone').value;
            const location = document.getElementById('inpLocation').value;
            const link = document.getElementById('inpLink').value;
            const summary = document.getElementById('inpSummary').value;
            const skillsStr = document.getElementById('inpSkills').value;

            // Header Generation
            let contactHTML = '';
            if (email) contactHTML += `<span>📧 ${escapeHtml(email)}</span>`;
            if (phone) contactHTML += `<span>📱 ${escapeHtml(phone)}</span>`;
            if (location) contactHTML += `<span>📍 ${escapeHtml(location)}</span>`;
            if (link) contactHTML += `<span>🔗 ${escapeHtml(link)}</span>`;

            // Skills Generation
            const skillsArray = skillsStr.split(',').map(s => s.trim()).filter(Boolean);
            let skillsHTML = skillsArray.map(s => `<div class="r-skill-badge">${escapeHtml(s)}</div>`).join('');

            // Experince Generation
            let expHTML = experiences.map(exp => `
                <div class="r-item">
                    <div class="r-item-head">
                        <div class="r-item-title">${escapeHtml(exp.title)}</div>
                        <div class="r-item-date">${escapeHtml(exp.date)}</div>
                    </div>
                    <div class="r-item-subtitle">${escapeHtml(exp.company)}</div>
                    <div class="r-item-desc">${escapeToBr(exp.desc)}</div>
                </div>
            `).join('');

            // Education Generation
            let eduHTML = educations.map(edu => `
                <div class="r-item">
                    <div class="r-item-head">
                        <div class="r-item-title">${escapeHtml(edu.degree)}</div>
                        <div class="r-item-date">${escapeHtml(edu.date)}</div>
                    </div>
                    <div class="r-item-subtitle">${escapeHtml(edu.school)}</div>
                    ${edu.desc ? `<div class="r-item-desc" style="color:#555; margin-top:2px;">${escapeHtml(edu.desc)}</div>` : ''}
                </div>
            `).join('');

            // Final Composite
            const preview = document.getElementById('resumePreview');
            preview.innerHTML = `
                <div class="r-header">
                    <div class="r-name">${escapeHtml(name)}</div>
                    <div class="r-title">${escapeHtml(title)}</div>
                    <div class="r-contact">${contactHTML}</div>
                </div>

                ${summary ? `
                <div class="r-section">
                    <div class="r-section-title">Professional Summary</div>
                    <div class="r-summary">${escapeToBr(summary)}</div>
                </div>` : ''}

                ${experiences.length > 0 ? `
                <div class="r-section">
                    <div class="r-section-title">Work Experience</div>
                    ${expHTML}
                </div>` : ''}

                ${educations.length > 0 ? `
                <div class="r-section">
                    <div class="r-section-title">Education</div>
                    ${eduHTML}
                </div>` : ''}

                ${skillsArray.length > 0 ? `
                <div class="r-section">
                    <div class="r-section-title">Technical Skills</div>
                    <div class="r-skills-list">${skillsHTML}</div>
                </div>` : ''}
            `;
        }

        // Initialize Call
        renderExpForms();
        renderEduForms();
        updateResume();
    </script>
</body>

</html>
