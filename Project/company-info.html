    <style>
        .hero-card {
            background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(124, 58, 237, .08));
            border: 1px solid rgba(79, 70, 229, .25);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .hero-logo {
            width: 88px;
            height: 88px;
            border-radius: 20px;
            object-fit: contain;
            background: #fff;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
            flex-shrink: 0;
        }

        .hero-logo-fb {
            width: 88px;
            height: 88px;
            border-radius: 20px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .hero-info h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: .35rem;
        }

        .hero-meta {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            margin-top: .75rem;
        }

        .meta-chip {
            background: rgba(15, 23, 55, .6);
            border: 1px solid var(--bg-glass-border);
            border-radius: 20px;
            padding: .3rem .9rem;
            font-size: .75rem;
            color: var(--text-secondary);
        }

        /* Section headers */
        .sec-head {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* Jobs */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .875rem;
        }

        @media(max-width:700px) {
            .job-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .job-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-glass-border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all .25s;
        }

        .job-card:hover {
            border-color: rgba(79, 70, 229, .35);
            transform: translateY(-3px);
        }

        .job-role {
            font-size: .9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: .35rem;
        }

        .job-type {
            font-size: .72rem;
            font-weight: 600;
            border-radius: 8px;
            padding: .15rem .55rem;
        }

        .type-ft {
            background: rgba(16, 185, 129, .15);
            color: #10b981;
        }

        .type-in {
            background: rgba(79, 70, 229, .15);
            color: var(--primary-light);
        }

        .job-sal {
            font-size: .78rem;
            color: var(--accent);
            font-weight: 700;
            margin-top: .5rem;
        }

        /* Skills */
        .skill-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
        }

        .skill-tag {
            background: rgba(79, 70, 229, .12);
            border: 1px solid rgba(79, 70, 229, .25);
            border-radius: 20px;
            padding: .35rem .9rem;
            font-size: .78rem;
            font-weight: 600;
            color: var(--primary-light);
        }

        .skill-tag.must {
            background: rgba(239, 68, 68, .1);
            border-color: rgba(239, 68, 68, .3);
            color: #ef4444;
        }

        /* Interview rounds */
        .rounds-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .round-item {
            background: var(--bg-card);
            border: 1px solid var(--bg-glass-border);
            border-radius: 18px;
            padding: 1.5rem;
            border-left: 4px solid var(--primary);
            transition: all .25s;
        }

        .round-item:hover {
            border-left-color: var(--accent);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
        }

        .round-num {
            width: 32px;
            height: 32px;
            background: var(--grad-primary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
        }

        .round-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .round-desc {
            font-size: .83rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin: .5rem 0;
        }

        .round-dur {
            font-size: .75rem;
            color: var(--text-muted);
        }

        .yt-link {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            background: rgba(255, 0, 0, .1);
            border: 1px solid rgba(255, 0, 0, .25);
            border-radius: 10px;
            padding: .45rem .9rem;
            text-decoration: none;
            font-size: .78rem;
            font-weight: 700;
            color: #ff4444;
            transition: all .2s;
            margin-top: .75rem;
            margin-right: .5rem;
        }

        .yt-link:hover {
            background: rgba(255, 0, 0, .2);
            transform: translateY(-1px);
        }

        /* Tips */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media(max-width:600px) {
            .tips-grid {
                grid-template-columns: 1fr;
            }
        }

        .tip-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-glass-border);
            border-radius: 16px;
            padding: 1.25rem;
        }

        .tip-icon {
            font-size: 1.75rem;
            margin-bottom: .625rem;
        }

        .tip-title {
            font-size: .88rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: .375rem;
        }

        .tip-body {
            font-size: .8rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 90px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(15, 23, 55, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 50%;
            padding: 0;
            color: #e8f4ff;
            cursor: pointer;
            z-index: 50;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.6);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .back-btn:hover svg {
            transform: translateX(-3px);
        }

        .diff-badge {
            font-size: .72rem;
            font-weight: 700;
            border-radius: 10px;
            padding: .25rem .75rem;
        }

        .diff-hard {
            background: rgba(239, 68, 68, .15);
            color: #ef4444;
        }

        .diff-med {
            background: rgba(245, 158, 11, .15);
            color: #f59e0b;
        }

        .diff-easy {
            background: rgba(16, 185, 129, .15);
            color: #10b981;
        }
    </style>
</head>

                        { icon: '💻', title: 'Focus on Basics', body: 'Revise core fundamentals of your domain before your technical interview. Review your own projects.' },
                        { icon: '🎯', title: 'Behavioral Questions', body: 'Practice answering behavioral scenarios with the STAR method (Situation, Task, Action, Result).' },
                        { icon: '🔥', title: 'Be Confident', body: 'Maintain a positive attitude and communicate clearly and openly.' }
                    ]
                };
            }

                return;

        <p style="font-size:.88rem;color:var(--text-secondary);line-height:1.7;max-width:600px;">${co.about}</p>
        <div class="hero-meta">
          <span class="meta-chip">📍 ${co.hq}</span>
          <span class="meta-chip">👥 ${co.emp} Employees</span>
          <span class="meta-chip">📅 Founded ${co.founded}</span>
          <span class="meta-chip">⭐ ${co.rating} Glassdoor</span>
          <span class="diff-badge ${diffClass}">${diffLabel}</span>
        </div>
      </div>
    </div>

    <!-- OPEN ROLES -->
    <div style="margin-bottom:2.5rem">
      <div class="sec-head">💼 Currently Open Roles</div>
      <div class="job-grid">${co.openRoles.map(j => `<div class="job-card"><div class="job-role">${j.title}</div><span class="job-type ${j.type === 'ft' ? 'type-ft' : 'type-in'}">${j.type === 'ft' ? 'Full-Time' : 'Internship'}</span><div class="job-sal">💰 ${j.sal}</div></div>`).join('')}</div>
    </div>

    <!-- SKILLS -->
    <div style="margin-bottom:2.5rem">
      <div class="sec-head">🛠️ Required Skills</div>
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:.875rem">🔴 Must-Have Skills &nbsp;|&nbsp; 🔷 Good to Have</p>
      <div class="skill-wrap">${co.mustSkills.map(s => `<span class="skill-tag must">${s}</span>`).join('')}${co.niceSkills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
    </div>

    <!-- INTERVIEW ROUNDS -->
    <div style="margin-bottom:2.5rem">
      <div class="sec-head">🎯 Interview Rounds (${co.rounds.length} Total)</div>
      <div class="rounds-list">${co.rounds.map(r => `
        <div class="round-item">
          <div style="display:flex;align-items:center;gap:.875rem;margin-bottom:.75rem">
            <span class="round-num">${r.num}</span>
            <div><div class="round-title">${r.emoji} ${r.name}</div><div class="round-dur">⏱️ Duration: ${r.dur}</div></div>
          </div>
          <div class="round-desc">${r.desc}</div>
          <div style="margin-top:.5rem;font-size:.78rem;font-weight:700;color:var(--primary-light);margin-bottom:.4rem">📺 Prep Videos for this Round:</div>
          ${r.videos.map(v => `<a href="${v.url}" target="_blank" class="yt-link">▶ ${v.title}</a>`).join('')}
        </div>`).join('')}

    <!-- TIPS -->
    <div style="margin-bottom:2rem">
      <div class="sec-head">💡 How to Crack ${co.name} — Expert Tips</div>
      <div class="tips-grid">${co.tips.map(t => `<div class="tip-card"><div class="tip-icon">${t.icon}</div><div class="tip-title">${t.title}</div><div class="tip-body">${t.body}</div></div>`).join('')}</div>
    </div>

    <!-- CTA -->
    <div style="background:linear-gradient(135deg,rgba(79,70,229,.15),rgba(124,58,237,.1));border:1px solid rgba(79,70,229,.25);border-radius:20px;padding:2rem;text-align:center;margin-top:1.5rem">
